# FSI Trade Analytics - Cortex Analyst セマンティックモデル
# ===================================================================
# このファイルは Cortex Analyst で自然言語から SQL を生成するための
# セマンティックモデル定義です。
#
# 使い方:
#   1. このファイルを Snowflake Stage にアップロード
#   2. Cortex Analyst アプリケーションでこのファイルを参照
#   3. "先月の通貨別取引額は？" のような自然言語で問い合わせ
#
# 参考: https://docs.snowflake.com/en/user-guide/snowflake-cortex/cortex-analyst

name: FSI Trade Analytics
description: |
  金融サービス業界向け分析モデル。
  貿易取引データ (50,000件) と法人営業データ (100-200件) を統合し、
  自然言語での分析クエリを可能にします。

tables:
  - name: trade_orders
    description: 貿易取引と顧客マスタを結合した取引ビュー (PII除外)
    base_table:
      database: fsi_zts_101
      schema: semantic_layer
      table: trade_orders_v
    dimensions:
      - name: transaction_id
        description: 取引ID (一意)
        expr: transaction_id
        data_type: VARCHAR
      - name: customer_id
        description: 顧客ID
        expr: customer_id
        data_type: VARCHAR
      - name: customer_region
        description: 顧客の所属リージョン (Tokyo / US / UK / APAC / EU)
        expr: customer_region
        data_type: VARCHAR
      - name: customer_segment
        description: 顧客セグメント (CORPORATE / SME / RETAIL)
        expr: customer_segment
        data_type: VARCHAR
      - name: risk_rating
        description: 顧客リスク格付け (LOW / MEDIUM / HIGH)
        expr: risk_rating
        data_type: VARCHAR
      - name: counterparty_country
        description: 取引相手国 (ISO 3166-1 alpha-2)
        expr: counterparty_country
        data_type: VARCHAR
      - name: transaction_type
        description: 取引種別 (IMPORT / EXPORT / REMITTANCE)
        expr: transaction_type
        data_type: VARCHAR
      - name: currency_code
        description: 取引通貨 (ISO 4217: JPY / USD / EUR / GBP 等)
        expr: currency_code
        data_type: VARCHAR
      - name: booking_branch
        description: 記帳拠点 (Tokyo / NewYork / London / Singapore)
        expr: booking_branch
        data_type: VARCHAR
      - name: instrument_type
        description: 取引手段 (LC=信用状 / TT=電信送金 / DOC_COLL=書類取立)
        expr: instrument_type
        data_type: VARCHAR
    time_dimensions:
      - name: trade_date
        description: 取引日
        expr: trade_date
        data_type: DATE
      - name: settlement_date
        description: 決済予定日
        expr: settlement_date
        data_type: DATE
    measures:
      - name: amount
        description: 取引金額 (各通貨建て)
        expr: amount
        data_type: NUMBER
        default_aggregation: sum
      - name: transaction_count
        description: 取引件数
        expr: "1"
        data_type: NUMBER
        default_aggregation: sum

  - name: corporate_sales
    description: 法人営業パイプラインデータ (PII除外)
    base_table:
      database: fsi_zts_101
      schema: semantic_layer
      table: corporate_sales_v
    dimensions:
      - name: deal_id
        description: 案件ID (一意)
        expr: deal_id
        data_type: VARCHAR
      - name: sales_rep
        description: 営業担当者
        expr: sales_rep
        data_type: VARCHAR
      - name: industry
        description: 業種 (製造 / 金融 / IT / 小売 / サービス / 公共)
        expr: industry
        data_type: VARCHAR
      - name: company_size
        description: 企業規模 (大手 / 中堅 / 中小)
        expr: company_size
        data_type: VARCHAR
      - name: stage
        description: 案件ステージ (提案 / 見積 / 受注 / 失注)
        expr: stage
        data_type: VARCHAR
      - name: region
        description: 地域 (関東 / 関西 / 中部 / 九州 / 海外)
        expr: region
        data_type: VARCHAR
    time_dimensions:
      - name: last_visit_date
        description: 最終訪問日
        expr: last_visit_date
        data_type: DATE
      - name: expected_close_date
        description: 受注予定日
        expr: expected_close_date
        data_type: DATE
    measures:
      - name: opportunity_amount
        description: 見込み額 (円)
        expr: opportunity_amount
        data_type: NUMBER
        default_aggregation: sum
      - name: deal_count
        description: 案件件数
        expr: "1"
        data_type: NUMBER
        default_aggregation: sum

# 自然言語クエリのサンプル (動作確認用)
verified_queries:
  - question: 先月の通貨別取引額は？
    sql: |
      SELECT currency_code, SUM(amount) AS total_amount
      FROM fsi_zts_101.semantic_layer.trade_orders_v
      WHERE trade_date >= DATEADD(month, -1, CURRENT_DATE())
        AND trade_date < CURRENT_DATE()
      GROUP BY currency_code
      ORDER BY total_amount DESC

  - question: 拠点別の取引件数トップ5は？
    sql: |
      SELECT booking_branch, COUNT(*) AS tx_count
      FROM fsi_zts_101.semantic_layer.trade_orders_v
      GROUP BY booking_branch
      ORDER BY tx_count DESC
      LIMIT 5

  - question: 営業担当者ごとの受注額ランキングを教えて
    sql: |
      SELECT sales_rep, SUM(opportunity_amount) AS won_amount
      FROM fsi_zts_101.semantic_layer.corporate_sales_v
      WHERE stage = '受注'
      GROUP BY sales_rep
      ORDER BY won_amount DESC

  - question: 業種別の受注率は？
    sql: |
      SELECT
        industry,
        COUNT(*) AS total_deals,
        COUNT_IF(stage = '受注') AS won_deals,
        ROUND(COUNT_IF(stage = '受注') / NULLIF(COUNT_IF(stage IN ('受注', '失注')), 0), 3) AS win_rate
      FROM fsi_zts_101.semantic_layer.corporate_sales_v
      GROUP BY industry
      ORDER BY win_rate DESC
